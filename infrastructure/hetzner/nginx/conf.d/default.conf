# ============================================
# Callception — Service Reverse Proxy Config
# ============================================

# ---- Upstream Definitions ----
upstream kokoro {
    server kokoro:8880;
}

upstream n8n {
    server n8n:5678;
}

upstream context_api {
    server context-api:8999;
}

# personaplex upstream REMOVED — moved to RunPod GPU Pod

# ================================================
# tts.callception.com — Kokoro TTS
# ================================================
server {
    listen 443 ssl;
    http2 on;
    server_name tts.callception.com;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

    limit_req zone=tts_limit burst=20 nodelay;

    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://callception.com";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }

        add_header Access-Control-Allow-Origin "https://callception.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        proxy_pass http://kokoro;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }

    location /health {
        proxy_pass http://kokoro/health;
        access_log off;
    }
}

# ================================================
# n8n.callception.com — Workflow Automation
# ================================================
server {
    listen 443 ssl;
    http2 on;
    server_name n8n.callception.com;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

    location / {
        proxy_pass http://n8n;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /webhook/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://n8n;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz {
        proxy_pass http://n8n/healthz;
        access_log off;
    }
}

# ================================================
# context.callception.com — Context API
# ================================================
server {
    listen 443 ssl;
    http2 on;
    server_name context.callception.com;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin-key.pem;

    limit_req zone=api_limit burst=30 nodelay;

    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://callception.com";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }

        add_header Access-Control-Allow-Origin "https://callception.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;

        proxy_pass http://context_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://context_api/health;
        access_log off;
    }
}

# infer.callception.com — REMOVED (moved to RunPod GPU Pod)

# ================================================
# HTTP → HTTPS Redirect
# ================================================
server {
    listen 80;
    server_name tts.callception.com n8n.callception.com context.callception.com;

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
