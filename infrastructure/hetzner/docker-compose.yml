# ============================================
# Callception — Hetzner VPS Docker Compose
# ============================================
# Kokoro TTS + n8n + Context API + Nginx
# Server: Hetzner CPX31 (4 vCPU, 8GB RAM, 160GB SSD)
# Region: Nuremberg (nbg1) — closest to Vercel fra1
#
# Storage: Hetzner Cloud Volume mounted at /mnt/callception-data
#   All persistent data lives on the volume — survives server
#   deletion/recreation. Volume can be detached and reattached.
#
# Usage:
#   cp .env.example .env  (fill in values)
#   docker compose up -d
#   docker compose logs -f
# ============================================

services:
  # ================================================
  # Nginx — Reverse Proxy + SSL Termination
  # ================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: callception-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      kokoro:
        condition: service_started
      n8n:
        condition: service_started
      context-api:
        condition: service_started
    networks:
      - callception-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ================================================
  # Kokoro TTS — English Only, CPU Mode
  # ================================================
  # Image: ~2-3GB (PyTorch CPU + ONNX + 82M model)
  # RAM: ~1.5GB at runtime
  # API: OpenAI-compatible POST /v1/audio/speech
  # ================================================
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: callception-kokoro
    restart: unless-stopped
    volumes:
      - ${VOLUME_PATH:-/mnt/callception-data}/kokoro-models:/app/models
    networks:
      - callception-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8880/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ================================================
  # n8n — Workflow Automation
  # ================================================
  # UI: https://n8n.callception.com (Basic Auth)
  # Webhooks: https://n8n.callception.com/webhook/*
  # ================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: callception-n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.${DOMAIN:-callception.com}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?N8N_PASSWORD is required}
      - GENERIC_TIMEZONE=Europe/Istanbul
      - DB_TYPE=sqlite
      - DB_SQLITE_DATABASE=/home/node/.n8n/database.sqlite
      # Internal network references
      - CONTEXT_API_URL=http://context-api:8999
      - PERSONAPLEX_API_KEY=${PERSONAPLEX_API_KEY:-}
    volumes:
      - ${VOLUME_PATH:-/mnt/callception-data}/n8n-data:/home/node/.n8n
    networks:
      - callception-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ================================================
  # Context API — Personaplex Sidecar (No GPU)
  # ================================================
  # Receives webhooks from Vercel (via lib/n8n/client.ts)
  # Stores context with TTL for voice sessions
  # Endpoints: /webhook/context, /webhook/event, /context/{id}
  # ================================================
  context-api:
    build:
      context: /opt/callception/personaplex_server
      dockerfile: Dockerfile.context-api
    container_name: callception-context-api
    restart: unless-stopped
    environment:
      - HOST=0.0.0.0
      - PORT=8999
      - PERSONAPLEX_API_KEY=${PERSONAPLEX_API_KEY:-}
      - CONTEXT_TTL_SEC=${CONTEXT_TTL_SEC:-1800}
    networks:
      - callception-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8999/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  callception-net:
    driver: bridge

# No Docker named volumes — all persistent data on Hetzner Cloud Volume
# Mount path: /mnt/callception-data (set VOLUME_PATH in .env to override)
# Structure:
#   /mnt/callception-data/
#   ├── kokoro-models/   (~500MB, TTS model weights)
#   ├── n8n-data/        (~50MB, workflows + SQLite DB)
#   └── backups/         (optional, automated backups)
