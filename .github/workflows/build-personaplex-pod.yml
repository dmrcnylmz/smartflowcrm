name: Build Personaplex GPU Pod Image

on:
  workflow_dispatch:   # Manuel tetikleme (Actions sekmesinden)
  push:
    branches: [main]
    paths:
      - 'personaplex_server/**'
      - 'infrastructure/runpod/Dockerfile.gpu-pod'
      - 'infrastructure/runpod/start.sh'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/dmrcnylmz/callception-personaplex-pod

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/runpod/Dockerfile.gpu-pod
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
